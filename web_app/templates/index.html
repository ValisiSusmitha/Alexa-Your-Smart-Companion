<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Alexa - Web Assistant</title>
    <style>
      body { font-family: Arial, sans-serif; background:#f6f8fb; color:#111 }
      #chat { width:700px; margin:30px auto; background:white; padding:16px; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.08)}
      .msg { margin:8px 0 }
      .user { color: #004080 }
      .bot { color: #00804d }
      #controls { margin-top:12px }
      button { padding:8px 12px; margin-right:8px }
    </style>
  </head>
  <body>
    <div id="chat">
      <h2>Alexa - Your Web Companion</h2>
      <div id="messages"></div>

      <div id="controls">
        <input id="textInput" placeholder="Type a command or use mic" style="width:60%" />
        <button id="sendBtn">Send</button>
        <button id="micBtn">Start Mic</button>
        <button id="stopMicBtn" disabled>Stop Mic</button>
        <button id="ttsBtn">Play Response (server TTS)</button>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
